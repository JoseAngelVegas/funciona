<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de Web Worker Único</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f9;
        }
        #contenedor {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .mensaje {
            padding: 8px;
            margin: 5px 0;
            background-color: #e2f0d9;
            border-left: 5px solid #70ad47;
            animation: aparecer 0.3s ease-in;
        }
        @keyframes aparecer {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h2>Mensajes desde el Web Worker</h2>
    <p>El temporizador corre en segundo plano cada 2 segundos:</p>
    
    <div id="contenedor">
        </div>

    <script id="codigo-worker" type="javascript/worker">
        let contador = 1;

        // Usamos un setInterval común y corriente dentro del worker
        setInterval(() => {
            self.postMessage("¡Hola! Soy el texto número " + contador);
            contador++;
        }, 2000); // 2000 milisegundos = 2 segundos
    </script>

    <script>
        const contenedor = document.getElementById('contenedor');

        // Extraemos el texto del script del worker
        const textoWorker = document.getElementById('codigo-worker').textContent;
        
        // Creamos la URL mágica (Blob)
        const blob = new Blob([textoWorker], { type: 'application/javascript' });
        const workerURL = URL.createObjectURL(blob);
        
        // Inicializamos el Worker
        const miWorker = new Worker(workerURL);

        // Escuchamos cuando el worker nos mande el texto cada 2 segundos
        miWorker.onmessage = function(event) {
            // Creamos un nuevo elemento p en el HTML
            const nuevoParrafo = document.createElement('p');
            nuevoParrafo.className = 'mensaje';
            nuevoParrafo.textContent = event.data;
            
            // Lo agregamos al contenedor
            contenedor.appendChild(nuevoParrafo);
        };
    </script>

</body>
</html>
