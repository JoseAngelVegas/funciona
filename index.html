<!DOCTYPE html>
<html lang="es">
<head>
    <title>No hay nombre</title>
    
    <style>
        body {
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #ffb970;
            transition: background-color 0.5s;
        }

        div {

        background-color: #1c7d80;
            text-align: center;
            border-radius: 2px;
            width: 500px;
            height: 500px;
      }
      
    </style>
    
</head>

<body>

    <div>
        <p class="texto" id="texto" style="color: #858ff1; font-size: 20px">Esto debería funcionar...</p>
    </div>

    <p id="mensaje" style="font-size: 20px">Acá hay un mensaje</p>

    <script>
                
        const opciones = [
        
             { texto: "¡Momento de energía!" , mensaje: "Hola 1" },
            { texto: "¡Momento de calma!" , mensaje: "Hola 2" },
            { texto: "¡Momento de concentración!" , mensaje: "Hola 3" },
            { texto: "¡Momento de energía!" , mensaje: "Hola 4" },
            { texto: "¡Momento de calma!" , mensaje: "Hola 5" },
            { texto: "¡Momento de concentración!" , mensaje: "Hola 6" },
            { texto: "¡Momento de energía!" , mensaje: "Hola 7" },
            { texto: "¡Momento de calma!" , mensaje: "Hola 8" },
            { texto: "¡Momento de concentración!" , mensaje: "Hola 9" },
            
                    ]

        function actualizarContenido() {
            
            const ahora = new Date();
            const dia = ahora.getSeconds();

            const bloqueDe5Minutos = Math.floor(dia / 5);

            const seleccionActual = opciones[bloqueDe5Minutos];

            document.getElementById("texto").innerText = seleccionActual.texto;
            document.getElementById("mensaje").innerText = seleccionActual.mensaje;
            
        }

        actualizarContenido();

        setInterval(actualizarContenido, 1000);

    </script>
    
  <script>

    const opcion = [
        
            { color: "#332b54" },
            { color: "#452b52" },
            { color: "#845b12" },
            { color: "#422b54" },
            { color: "#33784" },
            { color: "#452b52" },
            { color: "#845b12" },
            { color: "#422b54" },
            { color: "#33784" },
            { color: "#452b52" },
            { color: "#845b12" },
            { color: "#422b54" },
            { color: "#33784" },
            { color: "#452b52" },
            { color: "#845b12" },
            { color: "#422b54" },
            { color: "#33784" },
            { color: "#452b52" },
            { color: "#845b12" },
            { color: "#422b54" },
            { color: "#33784" },
            { color: "#452b52" },
            { color: "#845b12" },
            { color: "#422b54" },
            
                    ]

        function actualizarColor() {
            
            const ahora = new Date();
            const hora = ahora.getSeconds();

            const cambio = Math.floor(hora / 5);

            const seleccion = opcion[cambio];

            document.body.style.backgroundColor = seleccion.color;
            
        }

        actualizarColor();

        setInterval(actualizarColor, 1000);
    
</script>

    <script>

function reset_animation() {
  var el = document.getElementById('animated');
  el.style.animation = 'none';
  el.offsetHeight; /* trigger reflow */
  el.style.animation = null; 
}
    </script>

<div id="animated"></div>
<button onclick="reset_animation()">Reset</button>

<style>

#animated {
  position: absolute;
  top: 70px;
  width: 50px; height: 50px;
  background-color: black;
  animation: bounce 3s ease-in-out;
}
@keyframes bounce {
  0% { left: 0%; }
  100% { left: 100%; }
}
</style>

</body>
</html>
