<!DOCTYPE html>
<html lang="es">
<head>
    <title>No hay nombre</title>
    
    <style>
        body {
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
           
        }

        div {

        background-color: #1c7d80;
            text-align: center;
            border-radius: 2px;
            width: 500px;
            height: 500px;

        }
        
    </style>
    
</head>

<body>

    <div>
        <p id="texto" style="color: #858ff1; font-size: 20px">Esto debería funcionar...</p>
        <p id="texto2" style="color: #858ff1; font-size: 20px">Esto debería funcionar...</p>
    </div>

    <script>
                
        const opciones1 = [
            { texto: "¡Momento de energía!" },
            { texto: "¡Momento de calma!" },
            { texto: "¡Momento de concentración!" },
            { texto: "¡Momento de creatividad!"},
            { texto: "¡Momento de misterio!" },
            { texto: "¡Momento de romance!" },
            { texto: "¡Momento de frescura!" },
            { texto: "¡Momento de alegría!" },
                    ];

        const opciones2 = [
            
            { texto2: "¡Momento de probar!" },
            { texto2: "¡Momento de naturaleza!" },
            { texto2: "¡Momento de pasión!" },
            { texto2: "¡Momento de paz!" }
        ];

        function actualizarContenido() {
            
            const ahora = new Date();
            const segundos = ahora.getSeconds();

            const bloqueDe5Minutos = Math.floor(segundos / 5);

            const seleccionActual = opciones[bloqueDe5Minutos];

            document.getElementById("texto").innerText = seleccionActual.texto;
            document.getElementById("texto2").innerText = seleccionActual.texto2;

            
        }

        actualizarContenido();

        setInterval(actualizarContenido, 1000);

        

    </script>
</body>
</html>
