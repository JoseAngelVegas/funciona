<!DOCTYPE html>
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Frontend Para Dummies</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
<form name="contact-form" method="post" class="form" action="https://script.google.com/macros/s/AKfycbzCQVmpvNaqd4S_1BBQugU9DGXN-pcUIBSakm2A6oYUa2wvCsDIlK5G6eTbI8mHoCW01w/exec">
    <h1 class="title">Bienvenidos</h1>
    <h3 class="subtitle">¡Vamos, crea una cuenta!</h3>
    <div class="input-container ic1">
        <input name="Nombre" id="firstname" class="input" type="text" placeholder=" "/>
        <div class="cut"></div>
        <label for="firstname" class="placeholder">Nombre</label>
    </div>
    <div class="input-container ic2">
        <input name="Apellido" id="lastname" class="input" type="text" placeholder=" "/>
        <div class="cut"></div>
        <label for="lastname" class="placeholder">Apellido</label>
    </div>
    <div class="input-container ic2">
        <input name="Email" id="email" class="input" type="text" placeholder=" "/>
        <div class="cut cut-short"></div>
        <label for="email" class="placeholder">Email</label>
    </div>
    <button type="submit" class="submit">submit</button>
</form>
<script>

    const scriptUrl = 'https://script.google.com/macros/s/AKfycbzCQVmpvNaqd4S_1BBQugU9DGXN-pcUIBSakm2A6oYUa2wvCsDIlK5G6eTbI8mHoCW01w/exec';
const form = document.forms['contact-form'];

form.addEventListener('submit', e => {
    e.preventDefault()

    fetch(scriptUrl, {method: 'POST', body: new FormData(form)})
            .then(response => Swal.fire({
        title: "¡MUCHAS GRACIAS!",
        text: "Formulario Envíado",
        icon: "success"}))
            .then( () => { window.location.reload() } )
            .catch(error => console.error('Error', error.message))
})
    
</script>
</style>
</body>
</html>
