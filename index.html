<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo con Service Worker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f9;
        }
        #contenedor {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .mensaje {
            padding: 8px;
            margin: 5px 0;
            background-color: #e2f0d9;
            border-left: 5px solid #70ad47;
            animation: aparecer 0.3s ease-in;
        }
        @keyframes aparecer {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h2>Mensajes desde el Service Worker</h2>
    <p>El Worker se ejecuta en segundo plano. (Abre la consola para ver los mensajes activos).</p>
    
    <div id="contenedor"></div>

    <script>
        const contenedor = document.getElementById('contenedor');

        // 1. Registramos el Service Worker usando un Blob (para mantenerlo en un solo archivo)
        // Nota: Para producción, es mucho mejor tener un archivo separado llamado 'sw.js'
        const codigoSW = `
            let contador = 1;

            // El Service Worker se activa e instala
            self.addEventListener('install', (event) => {
                self.skipWaiting();
            });

            self.addEventListener('activate', (event) => {
                event.waitUntil(self.clients.claim());
                
                // Iniciamos el bucle. OJO: El navegador podría pausar esto si pasa mucho tiempo cerrada la web
                setInterval(() => {
                    console.log("Service Worker activo en segundo plano. Contador: " + contador);
                    
                    // Enviamos el mensaje a todas las pestañas abiertas (si las hay)
                    self.clients.matchAll().then(clients => {
                        clients.forEach(client => {
                            client.postMessage({ texto: "¡Hola! Soy el texto número " + contador });
                        });
                    });
                    contador++;
                }, 2000);
            });
        `;

        const blob = new Blob([codigoSW], { type: 'application/javascript' });
        const swURL = URL.createObjectURL(blob);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(swURL).then((registration) => {
                console.log('Service Worker registrado con éxito en el alcance:', registration.scope);
            }).catch((error) => {
                console.error('Fallo al registrar el Service Worker:', error);
            });

            // 2. Escuchamos los mensajes que envia el Service Worker cuando la página ESTÁ abierta
            navigator.serviceWorker.addEventListener('message', (event) => {
                const nuevoParrafo = document.createElement('p');
                nuevoParrafo.className = 'mensaje';
                nuevoParrafo.textContent = event.data.texto;
                contenedor.appendChild(nuevoParrafo);
            });
        } else {
            alert('Tu navegador no soporta Service Workers.');
        }
    </script>

</body>
</html>
