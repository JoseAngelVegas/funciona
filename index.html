<!DOCTYPE html>
<!doctype html>
<html lang="en">
<head>
    <title>Que pasaria 2</title>
</head>

<body>
<form name="contact-form" method="post" class="form" action="https://script.google.com/macros/s/AKfycbzCQVmpvNaqd4S_1BBQugU9DGXN-pcUIBSakm2A6oYUa2wvCsDIlK5G6eTbI8mHoCW01w/exec">
    <h1 class="title">Bienvenidos</h1>
    <h3 class="subtitle">¡Vamos, crea una cuenta!</h3>
    <div class="input-container ic1">
        <input name="Nombre" id="firstname" class="input" type="text" placeholder=" "/>
        <div class="cut"></div>
        <label for="firstname" class="placeholder">Nombre</label>
    </div>
    <button type="submit" class="submit">submit</button>
</form>
<script>

    const scriptUrl = 'https://script.google.com/macros/s/AKfycbzCQVmpvNaqd4S_1BBQugU9DGXN-pcUIBSakm2A6oYUa2wvCsDIlK5G6eTbI8mHoCW01w/exec';
const form = document.forms['contact-form'];

form.addEventListener('submit', e => {
    e.preventDefault()

    fetch(scriptUrl, {method: 'POST', body: new FormData(form)})
            .then(response => Swal.fire({
        title: "¡MUCHAS GRACIAS!",
        text: "Formulario Envíado",
        icon: "success"}))
            .then( () => { window.location.reload() } )
            .catch(error => console.error('Error', error.message))
})
    
</script>
</body>
</html>
