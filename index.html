<!DOCTYPE html>
<html lang="es">
<head>
    <title>No hay nombre</title>
    
    <style>
        body {
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
           
        }

        div {

        background-color: #1c7d80;
            text-align: center;
            border-radius: 2px;
            width: 500px;
            height: 500px;

        }
        
    </style>
    
</head>

<body>

    <div>
        <p id="texto" style="color: #858ff1; font-size: 20px">Esto debería funcionar...</p>
    </div>

    <script>
                
        const opciones = [
            { texto: "¡Momento de energía!" , mensaje: "Hola"},
            { texto: "¡Momento de calma!" , mensaje: "Jeje"},
            { texto: "¡Momento de concentración!" , mensaje: "XD" },
          
                    ];

        function actualizarContenido() {
            
            const ahora = new Date();
            const segundos = ahora.getSeconds();

            const bloqueDe5Minutos = Math.floor(segundos / 5);

            const seleccionActual = opciones[bloqueDe5Minutos];

            document.getElementById("texto").innerText = seleccionActual.texto;

            
        }

        actualizarContenido();

        setInterval(actualizarContenido, 1000);

    </script>
    
</body>
</html>
